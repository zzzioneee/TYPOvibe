<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pizza War — Bake to Win</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; color: #fff; touch-action: none; user-select: none; }
canvas { display: block; }
#ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
#ui > * { pointer-events: auto; }
.hidden { display: none !important; }
#team-select { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 20px; }
#team-select h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
#team-select p { font-size: 14px; opacity: 0.7; }
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 320px; }
.team-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 8px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; }
.team-btn:active, .team-btn.selected { border-color: #fff; background: rgba(255,255,255,0.15); transform: scale(0.95); }
.team-btn .icon { width: 40px; height: 40px; border-radius: 50%; }
.team-btn .name { font-size: 12px; font-weight: 600; }
#start-btn { margin-top: 8px; padding: 14px 48px; border: none; border-radius: 30px; background: #ff6b35; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; opacity: 0.4; pointer-events: none; transition: all 0.2s; }
#start-btn.active { opacity: 1; pointer-events: auto; }
#start-btn.active:active { transform: scale(0.95); }

#hud { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
#hud .row { display: flex; justify-content: space-between; align-items: center; }
#phase-label { font-size: 13px; font-weight: 700; opacity: 0.8; }
#timer { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
#score-label { font-size: 13px; font-weight: 600; opacity: 0.8; }
#war-bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); overflow: hidden; }
#war-bar .fill { height: 100%; background: #ff6b35; border-radius: 3px; transition: width 0.3s; }
#participants { font-size: 11px; opacity: 0.5; text-align: center; }

#toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 36px; font-weight: 900; color: #ff6b35; text-shadow: 0 2px 12px rgba(255,107,53,0.5); pointer-events: none; transition: transform 0.15s ease-out, opacity 0.3s; opacity: 0; }
#toast.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

#result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px 20px; text-align: center; }
#result-screen h2 { font-size: 32px; font-weight: 900; }
#result-screen .final-score { font-size: 64px; font-weight: 900; color: #ff6b35; }
#result-screen .message { font-size: 18px; font-weight: 700; opacity: 0.9; }
#result-screen .sub { font-size: 13px; opacity: 0.5; }
#replay-btn { padding: 14px 48px; border: 2px solid #fff; border-radius: 30px; background: transparent; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="team-select">
    <h1>PIZZA WAR</h1>
    <p>팀을 선택하고 피자를 완성하세요</p>
    <div class="team-grid"></div>
    <button id="start-btn">START</button>
  </div>
  <div id="hud" class="hidden">
    <div class="row"><span id="phase-label">PHASE 1</span><span id="timer">10.0</span></div>
    <div id="war-bar"><div class="fill" style="width:50%"></div></div>
    <div class="row"><span id="score-label">Score: 0</span><span id="participants"></span></div>
  </div>
  <div id="toast"></div>
  <div id="result-screen" class="hidden"></div>
</div>

<script>
const isThumb = location.search.includes('thumb');

const TEAMS = [
  { id: 'pepperoni', name: '페퍼로니', color: '#e63946', angle: Math.PI },
  { id: 'bulgogi', name: '불고기', color: '#8b5e3c', angle: 0 },
  { id: 'paprika', name: '파프리카', color: '#2d6a4f', angle: Math.PI / 3 },
  { id: 'olive', name: '올리브', color: '#333333', angle: (2 * Math.PI) / 3 },
  { id: 'cheese', name: '치즈', color: '#f4a261', angle: (4 * Math.PI) / 3 },
  { id: 'basil', name: '바질', color: '#52b788', angle: (5 * Math.PI) / 3 },
];

let selectedTeam = null;
let score = 0;
let phase = 0;
let canvas, ctx, W, H, cx, cy;
let animId = null;

function init() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  if (isThumb) { renderThumb(); return; }
  buildTeamSelect();
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}

function renderThumb() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  const r = Math.min(W, H) * 0.3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = '#f4a261'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r - 8, 0, Math.PI * 2); ctx.fillStyle = '#e63946'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r - 8, 0, Math.PI * 2); ctx.fillStyle = 'rgba(244,162,97,0.6)'; ctx.fill();
  TEAMS.forEach(t => {
    const tx = cx + Math.cos(t.angle) * r * 0.55;
    const ty = cy + Math.sin(t.angle) * r * 0.55;
    ctx.beginPath(); ctx.arc(tx, ty, 10, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
  });
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('PIZZA WAR', cx, cy + r + 36);
}

function buildTeamSelect() {
  const grid = document.querySelector('.team-grid');
  TEAMS.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'team-btn';
    btn.innerHTML = `<div class="icon" style="background:${t.color}"></div><span class="name">${t.name}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTeam = t;
      document.getElementById('start-btn').classList.add('active');
    });
    grid.appendChild(btn);
  });
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function startGame() {
  if (!selectedTeam) return;
  score = 0;
  document.getElementById('team-select').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  updateParticipants();
  startPhase1();
}

function updateParticipants() {
  const base = 3247 + Math.floor(Math.random() * 200);
  document.getElementById('participants').textContent = `${base.toLocaleString()}명 참여 중`;
}

function showToast(text) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

function updateHUD(phaseNum, timeLeft, phaseTitle) {
  document.getElementById('phase-label').textContent = phaseTitle || `PHASE ${phaseNum}`;
  document.getElementById('timer').textContent = timeLeft.toFixed(1);
  document.getElementById('score-label').textContent = `Score: ${score}`;
  const progress = Math.min(50 + score * 0.5, 95);
  document.querySelector('#war-bar .fill').style.width = progress + '%';
}

// ─── PHASE 1: 도우 반죽 (탭 연타) ───
function startPhase1() {
  phase = 1;
  let doughSize = 0;
  const targetSize = 1;
  const duration = 10;
  let elapsed = 0;
  let lastAI = 0;
  const tapGain = 0.04;
  const aiLoss = 0.08;

  function onTap(e) { e.preventDefault(); doughSize = Math.min(doughSize + tapGain, 1.3); }
  canvas.addEventListener('touchstart', onTap);
  canvas.addEventListener('mousedown', onTap);

  let lastTime = performance.now();
  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    elapsed += dt;
    const timeLeft = Math.max(0, duration - elapsed);

    lastAI += dt;
    if (lastAI > 2) { lastAI = 0; doughSize = Math.max(0, doughSize - aiLoss); showToast('AI 방해!'); }
    doughSize = Math.max(0, doughSize - dt * 0.01);

    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, W, H);
    const maxR = Math.min(W, H) * 0.32;
    // guide circle
    ctx.beginPath(); ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.setLineDash([8, 8]); ctx.stroke(); ctx.setLineDash([]);
    // dough
    const r = maxR * Math.min(doughSize, 1.2);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    const inRange = doughSize >= 0.9 && doughSize <= 1.1;
    ctx.fillStyle = inRange ? '#f4a261' : '#c8873a'; ctx.fill();
    // instruction
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('탭하여 반죽하세요!', cx, H - 60);

    updateHUD(1, timeLeft, 'PHASE 1 — 도우 반죽');

    if (elapsed >= duration) {
      canvas.removeEventListener('touchstart', onTap);
      canvas.removeEventListener('mousedown', onTap);
      const accuracy = 1 - Math.abs(doughSize - targetSize);
      const phaseScore = Math.max(0, Math.round(accuracy * 100));
      score += phaseScore;
      showToast(phaseScore > 70 ? 'Perfect!' : phaseScore > 40 ? 'Nice!' : 'OK');
      setTimeout(startPhase2, 800);
      return;
    }
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

// ─── PHASE 2: 토핑 투척 (드래그 플링) ───
function startPhase2() {
  phase = 2;
  const duration = 30;
  let elapsed = 0;
  const doughR = Math.min(W, H) * 0.28;
  const guideAngle = selectedTeam.angle;
  const guideX = cx + Math.cos(guideAngle) * doughR * 0.55;
  const guideY = cy + Math.sin(guideAngle) * doughR * 0.55;
  const guideR = 30;
  const toppings = [];
  let dragging = null;
  let dragStart = null;
  let hits = 0;
  let misses = 0;
  const maxToppings = 8;
  let spawnTimer = 0;
  let toppingCount = 0;

  function spawnTopping() {
    if (toppingCount >= maxToppings) return;
    toppingCount++;
    toppings.push({ x: cx + (Math.random() - 0.5) * 80, y: H - 80, vx: 0, vy: 0, r: 14, landed: false, flying: false, color: selectedTeam.color });
  }
  spawnTopping();

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }

  function onDown(e) {
    e.preventDefault();
    const p = getPos(e);
    for (let i = toppings.length - 1; i >= 0; i--) {
      const t = toppings[i];
      if (t.landed || t.flying) continue;
      if (Math.hypot(p.x - t.x, p.y - t.y) < 40) { dragging = t; dragStart = p; break; }
    }
  }
  function onMove(e) { e.preventDefault(); if (!dragging) return; const p = getPos(e); dragging.x = p.x; dragging.y = p.y; }
  function onUp(e) {
    e.preventDefault();
    if (!dragging || !dragStart) { dragging = null; return; }
    const p = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : { x: e.clientX, y: e.clientY };
    dragging.vx = (p.x - dragStart.x) * 0.1;
    dragging.vy = (p.y - dragStart.y) * 0.1;
    dragging.flying = true;
    dragging = null; dragStart = null;
  }

  canvas.addEventListener('touchstart', onDown);
  canvas.addEventListener('touchmove', onMove);
  canvas.addEventListener('touchend', onUp);
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);

  let lastTime = performance.now();
  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    elapsed += dt;
    spawnTimer += dt;
    if (spawnTimer > 3 && toppingCount < maxToppings) { spawnTimer = 0; spawnTopping(); }
    const timeLeft = Math.max(0, duration - elapsed);

    toppings.forEach(t => {
      if (!t.flying || t.landed) return;
      t.x += t.vx; t.y += t.vy; t.vy += 0.3;
      if (Math.hypot(t.x - guideX, t.y - guideY) < guideR + t.r) { t.landed = true; t.x = guideX + (Math.random() - 0.5) * 20; t.y = guideY + (Math.random() - 0.5) * 20; hits++; showToast('Hit!'); }
      else if (t.y > H + 50) { t.landed = true; misses++; }
    });

    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, W, H);
    // dough
    ctx.beginPath(); ctx.arc(cx, cy, doughR, 0, Math.PI * 2); ctx.fillStyle = '#f4a261'; ctx.fill();
    // guide zone
    ctx.beginPath(); ctx.arc(guideX, guideY, guideR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
    // toppings
    toppings.forEach(t => {
      ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
    });
    // instruction
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('재료를 드래그해서 가이드에 올리세요', cx, H - 40);

    updateHUD(2, timeLeft, 'PHASE 2 — 토핑 투척');

    if (elapsed >= duration) {
      canvas.removeEventListener('touchstart', onDown);
      canvas.removeEventListener('touchmove', onMove);
      canvas.removeEventListener('touchend', onUp);
      canvas.removeEventListener('mousedown', onDown);
      canvas.removeEventListener('mousemove', onMove);
      canvas.removeEventListener('mouseup', onUp);
      const phaseScore = Math.round((hits / Math.max(1, hits + misses)) * 100);
      score += phaseScore;
      showToast(hits >= 6 ? 'Perfect!' : hits >= 3 ? 'Nice!' : 'OK');
      setTimeout(startPhase3, 800);
      return;
    }
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

// ─── PHASE 3: 오븐 가열 (스크롤/스와이프) ───
function startPhase3() {
  phase = 3;
  const duration = 20;
  let elapsed = 0;
  let temp = 150;
  const minTarget = 200, maxTarget = 250;
  let inZoneTime = 0;
  let lastAI = 0;
  let aiEvent = null;

  function onScroll(e) { e.preventDefault(); temp += (e.deltaY || 0) * -0.1; }
  function onTouchMoveScroll(e) {
    e.preventDefault();
    if (e.touches.length > 0) temp += 2;
  }
  function onTouchEndScroll() { /* temp drifts down naturally */ }

  window.addEventListener('wheel', onScroll, { passive: false });
  canvas.addEventListener('touchmove', onTouchMoveScroll, { passive: false });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); temp += 3; }, { passive: false });

  const touchHandler = (e) => { e.preventDefault(); temp += 3; };
  canvas.addEventListener('touchstart', touchHandler, { passive: false });

  let lastTime = performance.now();
  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    elapsed += dt;
    const timeLeft = Math.max(0, duration - elapsed);

    // natural cooling
    temp -= dt * 8;
    temp = Math.max(50, Math.min(350, temp));

    // AI interference
    lastAI += dt;
    if (lastAI > 4) {
      lastAI = 0;
      const r = Math.random();
      if (r < 0.5) { temp += 40; aiEvent = '온도 급상승!'; }
      else { temp -= 30; aiEvent = '온도 급하강!'; }
      showToast(aiEvent);
    }

    const inZone = temp >= minTarget && temp <= maxTarget;
    if (inZone) inZoneTime += dt;

    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, W, H);
    // oven bg
    const ovenW = W * 0.7, ovenH = H * 0.4;
    const ox = (W - ovenW) / 2, oy = (H - ovenH) / 2;
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(ox, oy, ovenW, ovenH);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 3; ctx.strokeRect(ox, oy, ovenW, ovenH);
    // pizza inside
    const pizzaR = Math.min(ovenW, ovenH) * 0.3;
    ctx.beginPath(); ctx.arc(cx, cy, pizzaR, 0, Math.PI * 2); ctx.fillStyle = '#f4a261'; ctx.fill();
    // glow based on temp
    const glow = Math.min(1, (temp - 100) / 250);
    ctx.beginPath(); ctx.arc(cx, cy, pizzaR + 10, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, ${Math.round(100 - glow * 80)}, 0, ${glow * 0.3})`; ctx.fill();

    // thermometer
    const thermoX = W - 50, thermoH = H * 0.5, thermoY = (H - thermoH) / 2;
    ctx.fillStyle = '#333'; ctx.fillRect(thermoX - 8, thermoY, 16, thermoH);
    const fillH = ((temp - 50) / 300) * thermoH;
    const fillColor = inZone ? '#4caf50' : temp > maxTarget ? '#e63946' : '#ff9800';
    ctx.fillStyle = fillColor; ctx.fillRect(thermoX - 8, thermoY + thermoH - fillH, 16, fillH);
    // target zone markers
    const zoneTop = thermoY + thermoH - ((maxTarget - 50) / 300) * thermoH;
    const zoneBot = thermoY + thermoH - ((minTarget - 50) / 300) * thermoH;
    ctx.strokeStyle = 'rgba(76,175,80,0.7)'; ctx.lineWidth = 1;
    ctx.strokeRect(thermoX - 12, zoneTop, 24, zoneBot - zoneTop);
    // temp text
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${Math.round(temp)}°`, thermoX, thermoY - 12);

    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '14px sans-serif';
    ctx.fillText('위로 스와이프하여 온도를 올리세요', cx, H - 40);

    updateHUD(3, timeLeft, 'PHASE 3 — 오븐 가열');

    if (elapsed >= duration) {
      window.removeEventListener('wheel', onScroll);
      canvas.removeEventListener('touchmove', onTouchMoveScroll);
      canvas.removeEventListener('touchstart', touchHandler);
      const phaseScore = Math.round((inZoneTime / duration) * 100);
      score += phaseScore;
      showToast(phaseScore > 70 ? 'Perfect!' : phaseScore > 40 ? 'Nice!' : 'OK');
      setTimeout(showResult, 800);
      return;
    }
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

// ─── 결과 화면 ───
function showResult() {
  phase = 0;
  document.getElementById('hud').classList.add('hidden');
  const el = document.getElementById('result-screen');
  el.classList.remove('hidden');
  el.innerHTML = `
    <h2>ONE TEAM, ONE PIZZA</h2>
    <div class="final-score">${score}</div>
    <div class="message">우리 팀 피자 완성!</div>
    <div class="sub">6팀의 재료가 하나의 피자로 합쳐졌습니다</div>
    <button id="replay-btn" onclick="location.reload()">다시 하기</button>
  `;
  // draw completed pizza
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, W, H);
  const r = Math.min(W, H) * 0.25;
  ctx.beginPath(); ctx.arc(cx, cy * 0.6, r, 0, Math.PI * 2); ctx.fillStyle = '#f4a261'; ctx.fill();
  TEAMS.forEach(t => {
    const tx = cx + Math.cos(t.angle) * r * 0.55;
    const ty = cy * 0.6 + Math.sin(t.angle) * r * 0.55;
    ctx.beginPath(); ctx.arc(tx, ty, 12, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
  });
}

init();
</script>
</body>
</html>
