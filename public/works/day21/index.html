<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day 22 — 낯선 사람들이 모이면</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #111;
    --paper-2: #1a1a1a;
    --ink: #ffffff;
    --mute: rgba(255,255,255,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #111;
    color: var(--ink);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #root {
    width: 1920px; height: 1080px;
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: center center;
  }

  /* bg.jpg background + black dim 20% */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: url('./bg.jpg') center/cover no-repeat;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: rgba(0,0,0,0.65);
    z-index: 1;
  }
  #root { position: relative; z-index: 2; }

  .from-wrap { position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:100; }
  .from-link { font-family:'Pretendard', sans-serif; font-size:20px; font-weight:500;
    color:#fff; text-decoration:none; letter-spacing:0.15em; }
  .from-link:hover { color:rgba(255,255,255,0.75); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="from-wrap">
  <a href="https://bemyb.kr/contents/?q=YToxOntzOjEyOiJrZXl3b3JkX3R5cGUiO3M6MzoiYWxsIjt9&bmode=view&idx=170905285&t=board" target="_blank" rel="noopener" class="from-link">FROM</a>
</div>
<div id="root"></div>

<!-- Hidden global SVG defs (filters used by jamo SVGs) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="hd-wobble" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.06" numOctaves="3" seed="4" result="t1"/>
      <feDisplacementMap in="SourceGraphic" in2="t1" scale="5.5" result="d1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.18" numOctaves="2" seed="11" result="t2"/>
      <feDisplacementMap in="d1" in2="t2" scale="2.2"/>
    </filter>
    <filter id="hd-wobble-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="7" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="3"/>
    </filter>
    <!-- graffiti noise texture overlay on white glyphs -->
    <filter id="graffiti-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="thresh">
        <feFuncA type="discrete" tableValues="0 0 0.3 0.5 0.6 0.7 0.8 0.9 1 1"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="thresh" operator="in"/>
    </filter>
  </defs>
</svg>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="jamos.jsx"></script>
<script type="text/babel" src="syllables.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
// Fixed layout: 1920x1080, scale to fit viewport
(function() {
  var W = 1920, H = 1080;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var s = Math.min(vw / W, vh / H);
    var root = document.getElementById('root');
    root.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
</body>
</html>
