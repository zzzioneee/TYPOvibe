<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<style>
:root { --paper: #f1ece1; --ink: #14110d; }
body { background: var(--paper); padding: 32px; font-family: monospace; margin: 0; }
.grid { display: grid; grid-template-columns: repeat(6, 180px); gap: 16px; }
.cell { width: 180px; height: 180px; background: var(--paper); border: 1px solid #0001; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.cell svg { width: 150px; height: 150px; color: var(--ink); }
.label { font-size: 12px; color: #6b6354; margin-top: 6px; }
h2 { margin: 40px 0 12px; font-size: 13px; color: #6b6354; letter-spacing: 0.2em; }
</style></head><body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="hd-wobble" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.06" numOctaves="3" seed="4" result="t1"/>
      <feDisplacementMap in="SourceGraphic" in2="t1" scale="5.5" result="d1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.18" numOctaves="2" seed="11" result="t2"/>
      <feDisplacementMap in="d1" in2="t2" scale="2.2"/>
    </filter>
    <filter id="hd-wobble-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="7" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="3"/>
    </filter>
  </defs>
</svg>
<h2>JAMOS — strong wobble</h2>
<div class="grid" id="grid"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="jamos.jsx"></script>
<script type="text/babel">
const names = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅊ','ㅏ','ㅓ','ㅗ','ㅜ','ㅡ','ㅣ','ㅕ','ㅐ','ㅛ'];
ReactDOM.createRoot(document.getElementById('grid')).render(
  <>{names.map(n => (
    <div className="cell" key={n}>
      <JamoSVG name={n} wobble="strong"/>
      <div className="label">{n}</div>
    </div>
  ))}</>
);
</script>
</body></html>
