<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day 22 — 낯선 사람들이 모이면</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f1ece1;
    --paper-2: #ece6d6;
    --ink: #14110d;
    --mute: #6b6354;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* paper grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(20,17,13,0.025), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(20,17,13,0.025), transparent 40%);
    mix-blend-mode: multiply;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.05  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.45;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  #root { position: relative; z-index: 2; }

  .from-wrap { position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:100; }
  .from-link { font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:500;
    color:rgba(0,0,0,0.4); text-decoration:none; letter-spacing:0.15em; }
  .from-link:hover { color:rgba(0,0,0,0.8); }

  .crosshair {
    position: fixed; top: 18px; left: 18px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mute);
    z-index: 10;
  }
  .crosshair .dot { display:inline-block; width:6px; height:6px; background:var(--ink); border-radius:50%; vertical-align:middle; margin-right:8px; }
  .meta-r {
    position: fixed; top: 18px; right: 18px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mute);
    text-align: right;
    z-index: 10;
  }
  .footer {
    position: fixed; left: 0; right: 0; bottom: 18px;
    text-align: center;
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--mute);
    z-index: 10;
  }
  .replay-btn {
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 8px 18px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms, color 120ms;
  }
  .replay-btn:hover { background: var(--ink); color: var(--paper); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="from-wrap">

</div>
<div id="root"></div>

<!-- Hidden global SVG defs (filters used by jamo SVGs) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="hd-wobble" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.06" numOctaves="3" seed="4" result="t1"/>
      <feDisplacementMap in="SourceGraphic" in2="t1" scale="5.5" result="d1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.18" numOctaves="2" seed="11" result="t2"/>
      <feDisplacementMap in="d1" in2="t2" scale="2.2"/>
    </filter>
    <filter id="hd-wobble-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="7" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="3"/>
    </filter>
  </defs>
</svg>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="jamos.jsx"></script>
<script type="text/babel" src="syllables.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
