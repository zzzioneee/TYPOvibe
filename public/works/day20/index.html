<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 20 — 절창</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    #stage {
      width: 1920px; height: 1080px;
      position: absolute;
      top: 50%; left: 50%;
      transform-origin: center center;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }
    .from-wrap { position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:100; }
    .from-link { font-family:'Pretendard', sans-serif; font-size:20px; font-weight:500;
      color:#fff; text-decoration:none; letter-spacing:0.15em; }
    .from-link:hover { color:rgba(255,255,255,0.75); }
  </style>
</head>
<body>
  <div class="from-wrap">
    <a href="https://www.instagram.com/marianbijlenga/p/DYhPwSTGyzL/?img_index=1" target="_blank" rel="noopener" class="from-link">FROM</a>
  </div>
  <div id="stage">
    <canvas id="c"></canvas>
  </div>
  <script src="day20.js"></script>
  <script>
  (function() {
    var W = 1920, H = 1080;
    function fit() {
      var vw = window.innerWidth, vh = window.innerHeight;
      var s = Math.min(vw / W, vh / H);
      document.getElementById('stage').style.transform = 'translate(-50%,-50%) scale(' + s + ')';
    }
    fit();
    window.addEventListener('resize', fit);
  })();
  </script>
</body>
</html>
