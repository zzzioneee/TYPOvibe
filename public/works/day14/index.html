<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Day 14 v2: 1만 명의 가상 한국인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f5f5; font-family: 'Pretendard', -apple-system, sans-serif; }

#header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 30px 40px;
  background: linear-gradient(to bottom, #f5f5f5 60%, transparent);
  z-index: 10;
  pointer-events: none;
}
#header h1 { font-size: 14px; color: rgba(0,0,0,0.4); font-weight: 400; }
#header .count { font-family: 'Plus Jakarta Sans', monospace; font-size: 12px; color: rgba(0,0,0,0.3); margin-top: 4px; }

#table {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 100px;
  background: linear-gradient(to bottom, #4a4a4a, #333);
  z-index: 5;
  box-shadow: 0 -2px 15px rgba(0,0,0,0.2);
}

#grid {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: 0px;
  padding: 0 40px;
  padding-bottom: 80px;
  overflow-x: scroll;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

#grid::-webkit-scrollbar { display: none; }

.avatar-card {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.3s ease, filter 0.3s ease;
  position: relative;
}
.avatar-card:hover { transform: translateY(-10px) scale(1.05); filter: brightness(1.05); }
.avatar-card svg { width: 500px; height: 620px; }

.persona-info {
  position: absolute;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.88);
  color: #fff;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  width: 240px;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 20;
}
.persona-info.show { opacity: 1; pointer-events: all; }
.persona-info .name { font-weight: 700; font-size: 18px; margin-bottom: 6px; }
.persona-info .desc { color: rgba(255,255,255,0.8); font-size: 14px; }
.from-wrap {
  position: fixed; top: 24px; left: 50%;
  transform: translateX(-50%); z-index: 100;
}
.from-link {
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-size: 20px; font-weight: 500;
  color: rgba(0,0,0,0.4);
  text-decoration: none; letter-spacing: 0.15em;
}
.from-link:hover { color: rgba(0,0,0,0.8); }
</style>
</head>

<div id="header">

<script>
const isThumb = location.search.includes('thumb');

// Korean names
const SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남','심','노','하','곽','성','차','주','우','민','진'];
const MALE_NAMES = ['민준','서준','도윤','예준','시우','하준','주원','지호','지후','준서','건우','현우','도현','우진','선우','서진','연우','정우','유준','승현','준혁','승우','지환','승민','현준','재윤','태윤','한결','지훈','민재','인우','윤호','시윤','동현','재원','민성','수호','은우','준영','성민'];
const FEMALE_NAMES = ['서윤','서연','지우','하은','하윤','민서','지유','윤서','채원','수아','지아','다은','예은','수빈','지원','소율','예린','하린','지민','소연','채은','유진','은서','미래','하영','수연','지현','예지','서현','민지','유나','다현','소희','연우','은지','수정','혜원','지영','서영','민아'];

const OCCUPATIONS = [
  {job:'하역 및 적재 관련 단순 종사원',desc:'투박한 손마디로 삶의 무게 중심을 잡아온',ageMin:50,ageMax:75},
  {job:'회계 사무원',desc:'복잡한 숫자 속에서 질서를 찾아내는',ageMin:30,ageMax:70},
  {job:'영상 편집자',desc:'프레임 사이에 이야기를 심는',ageMin:22,ageMax:35},
  {job:'초등학교 교사',desc:'아이들의 첫 세상을 함께 여는',ageMin:25,ageMax:55},
  {job:'배달 라이더',desc:'도시의 골목을 누비며 일상을 연결하는',ageMin:20,ageMax:45},
  {job:'한의사',desc:'맥을 짚어 몸의 균형을 되찾아주는',ageMin:30,ageMax:65},
  {job:'웹 개발자',desc:'코드 한 줄로 세상과 소통하는',ageMin:22,ageMax:40},
  {job:'택시 기사',desc:'새벽 도로 위에서 누군가의 귀갓길을 책임지는',ageMin:40,ageMax:70},
  {job:'플로리스트',desc:'꽃잎 하나에 마음을 담아 건네는',ageMin:25,ageMax:50},
  {job:'치과 위생사',desc:'환자의 긴장을 녹이며 구강 건강을 지키는',ageMin:23,ageMax:45},
  {job:'대학원생',desc:'논문 한 편에 청춘을 걸고 있는',ageMin:24,ageMax:32},
  {job:'요리사',desc:'불 앞에서 맛의 균형을 잡아가는',ageMin:25,ageMax:55},
  {job:'간호사',desc:'밤새 환자 곁을 지키며 생명을 돌보는',ageMin:23,ageMax:50},
  {job:'건축 설계사',desc:'선 하나로 공간의 가능성을 그려내는',ageMin:28,ageMax:55},
  {job:'바리스타',desc:'원두의 향을 읽어 하루의 시작을 열어주는',ageMin:20,ageMax:35},
  {job:'물류 관리자',desc:'보이지 않는 곳에서 세상의 흐름을 조율하는',ageMin:30,ageMax:50},
  {job:'피아노 강사',desc:'건반 위에서 감정의 언어를 가르치는',ageMin:25,ageMax:55},
  {job:'소방관',desc:'불길 속에서도 한 생명을 향해 뛰어드는',ageMin:25,ageMax:50},
  {job:'편의점 점주',desc:'24시간 동네의 불을 밝히는',ageMin:35,ageMax:60},
  {job:'UX 디자이너',desc:'사용자의 손끝에서 경험을 설계하는',ageMin:24,ageMax:38},
  {job:'농부',desc:'흙과 대화하며 한 해의 결실을 기다리는',ageMin:40,ageMax:75},
  {job:'통역사',desc:'언어의 벽을 허물어 마음을 잇는',ageMin:28,ageMax:50},
  {job:'미용사',desc:'가위 끝에서 자신감을 선물하는',ageMin:22,ageMax:50},
  {job:'경비원',desc:'밤의 고요 속에서 일상의 안전을 지키는',ageMin:55,ageMax:75},
  {job:'사회복지사',desc:'소외된 이웃의 목소리에 귀 기울이는',ageMin:25,ageMax:55},
  {job:'트럭 운전사',desc:'긴 도로 위에서 물류의 마지막 퍼즐을 맞추는',ageMin:35,ageMax:65},
  {job:'치킨집 사장',desc:'튀김옷 속에 정성을 입혀 내놓는',ageMin:35,ageMax:60},
  {job:'공무원',desc:'민원 창구에서 시민의 일상을 돕는',ageMin:25,ageMax:55},
  {job:'유튜버',desc:'카메라 앞에서 자신만의 세계를 펼치는',ageMin:18,ageMax:35},
  {job:'목수',desc:'나무결을 읽으며 공간에 온기를 더하는',ageMin:30,ageMax:65},
];

const SKIN_TONES = [
  { base: '#FDDCB5', shadow: '#E8C49A', highlight: '#FFF0E0' },
  { base: '#F5C8A0', shadow: '#D4A87A', highlight: '#FFE8D0' },
  { base: '#F0B88A', shadow: '#CC9668', highlight: '#FFD8B8' },
  { base: '#F7D5B0', shadow: '#D4B48A', highlight: '#FFF0D8' },
  { base: '#FCEBD4', shadow: '#E0CDB0', highlight: '#FFFFF0' },
];
const HAIR_COLORS = [
  { base: '#1a1a1a', highlight: '#3a3a3a' },
  { base: '#2c2c2c', highlight: '#4a4a4a' },
  { base: '#3d2b1f', highlight: '#5a4030' },
  { base: '#1f1f1f', highlight: '#3d3d3d' },
];
const LIP_COLORS = ['#c45c5c','#b85555','#d06868','#a84848'];
const SHIRT_COLORS = ['#2c3e50','#34495e','#1a1a2e','#4a4a6a','#3d5a80','#e8e8e8','#c8d6e5','#576574','#dfe6e9','#b2bec3','#6c5ce7','#a29bfe','#fd79a8','#00b894'];

function rand(min, max) { return min + Math.random() * (max - min); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amt); g = Math.max(0, g - amt); b = Math.max(0, b - amt);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function generatePersona() {
  const occ = pick(OCCUPATIONS);
  const isMale = Math.random() > 0.5;
  const age = Math.floor(rand(occ.ageMin, occ.ageMax));
  const surname = pick(SURNAMES);
  const givenName = pick(isMale ? MALE_NAMES : FEMALE_NAMES);
  const name = surname + givenName;
  const desc = `${occ.desc} ${age}세 ${occ.job.split(' ')[0]}`;
  return { name, age, job: occ.job, desc, isMale };
}

function generateAvatarDiverse(persona, lastSkin, lastHair, lastShirt) {
  let skinIdx, hairIdx, shirtIdx;
  do { skinIdx = Math.floor(Math.random() * SKIN_TONES.length); } while (skinIdx === lastSkin);
  do { hairIdx = Math.floor(Math.random() * HAIR_COLORS.length); } while (hairIdx === lastHair);
  do { shirtIdx = Math.floor(Math.random() * SHIRT_COLORS.length); } while (shirtIdx === lastShirt);

  const skin = SKIN_TONES[skinIdx];
  const hairColor = HAIR_COLORS[hairIdx];
  const lip = pick(LIP_COLORS);
  const shirt = SHIRT_COLORS[shirtIdx];
  const hasGlasses = Math.random() > 0.65;
  const hasStripes = Math.random() > 0.7;
  const hasFreckles = Math.random() > 0.85;
  const hasMole = Math.random() > 0.8;
  const hasEarrings = !persona.isMale && Math.random() > 0.6;

  const faceW = rand(55, 68);
  const faceH = rand(65, 78);
  const cx = 80, faceTop = 40;
  const faceBottom = faceTop + faceH;
  const neckTop = faceBottom - 3;
  const neckBottom = neckTop + 16;
  const bodyTop = neckBottom - 2;
  const eyeY = faceTop + faceH * 0.42;
  const eyeSpacing = rand(12, 16);
  const eyeSize = rand(5, 7);
  const noseY = faceTop + faceH * 0.62;
  const mouthY = faceTop + faceH * 0.76;
  const uid = Math.random().toString(36).slice(2,6);

  let svg = `<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs>
    <radialGradient id="fg${uid}" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="${skin.highlight}"/><stop offset="70%" stop-color="${skin.base}"/><stop offset="100%" stop-color="${skin.shadow}"/>
    </radialGradient>
    <linearGradient id="hg${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${hairColor.highlight}"/><stop offset="60%" stop-color="${hairColor.base}"/><stop offset="100%" stop-color="${darken(hairColor.base,15)}"/>
    </linearGradient>
    <radialGradient id="sg${uid}" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="${shirt}"/><stop offset="100%" stop-color="${darken(shirt,25)}"/>
    </radialGradient>
  </defs>`;

  // Shoulders/body — starts below neck, no overlap
  const bodyPath = `M ${cx-40} 195 Q ${cx-40} ${bodyTop+20}, ${cx-14} ${bodyTop} L ${cx+14} ${bodyTop} Q ${cx+40} ${bodyTop+20}, ${cx+40} 195 Z`;
  if (hasStripes) {
    const stripeColor = darken(shirt, 40);
    svg += `<clipPath id="bc${uid}"><path d="${bodyPath}"/></clipPath>`;
    svg += `<path d="${bodyPath}" fill="url(#sg${uid})"/>`;
    svg += `<g clip-path="url(#bc${uid})">`;
    for (let sy = bodyTop + 6; sy < 195; sy += 7) {
      svg += `<line x1="${cx-45}" y1="${sy}" x2="${cx+45}" y2="${sy}" stroke="${stripeColor}" stroke-width="2.5" opacity="0.4"/>`;
    }
    svg += `</g>`;
  } else {
    svg += `<path d="${bodyPath}" fill="url(#sg${uid})"/>`;
  }

  // Neck — between face and body
  svg += `<rect x="${cx-11}" y="${neckTop}" width="22" height="${neckBottom - neckTop}" rx="6" fill="${skin.base}"/>`;
  svg += `<rect x="${cx-11}" y="${neckTop}" width="22" height="5" rx="3" fill="${skin.shadow}" opacity="0.3"/>`;
  // Face
  svg += `<ellipse cx="${cx}" cy="${faceTop + faceH/2}" rx="${faceW/2}" ry="${faceH/2}" fill="url(#fg${uid})"/>`;
  // Ears
  svg += `<ellipse cx="${cx-faceW/2+2}" cy="${eyeY+4}" rx="4" ry="7" fill="${skin.base}"/>`;
  svg += `<ellipse cx="${cx+faceW/2-2}" cy="${eyeY+4}" rx="4" ry="7" fill="${skin.base}"/>`;

  // Hair — diverse styles with caps
  const hairTop = faceTop - 5;
  const hairInner = faceTop + faceH * 0.35;
  const hasCap = Math.random() > 0.8;

  if (hasCap) {
    const capColor = pick(["#2c3e50","#e74c3c","#3498db","#27ae60","#f39c12","#8e44ad","#1abc9c"]);
    const capStyle = Math.floor(Math.random() * 2);
    if (capStyle === 0) { // baseball cap — solid dome covering top of head
      svg += `<path d="M ${cx-faceW/2-2} ${faceTop+faceH*0.3}
        Q ${cx-faceW/2-4} ${faceTop-2}, ${cx} ${faceTop-5}
        Q ${cx+faceW/2+4} ${faceTop-2}, ${cx+faceW/2+2} ${faceTop+faceH*0.3}
        Z" fill="${capColor}"/>`;
      // Brim
      svg += `<ellipse cx="${cx}" cy="${faceTop+faceH*0.28}" rx="${faceW/2+10}" ry="5" fill="${darken(capColor,25)}"/>`;
    } else { // beanie — covers top of head snugly
      svg += `<path d="M ${cx-faceW/2-1} ${faceTop+faceH*0.25}
        Q ${cx-faceW/2-3} ${faceTop-5}, ${cx} ${faceTop-8}
        Q ${cx+faceW/2+3} ${faceTop-5}, ${cx+faceW/2+1} ${faceTop+faceH*0.25}
        Z" fill="${capColor}"/>`;
      // Fold band
      svg += `<path d="M ${cx-faceW/2-1} ${faceTop+faceH*0.25}
        Q ${cx} ${faceTop+faceH*0.22}, ${cx+faceW/2+1} ${faceTop+faceH*0.25}
        L ${cx+faceW/2+1} ${faceTop+faceH*0.18}
        Q ${cx} ${faceTop+faceH*0.15}, ${cx-faceW/2-1} ${faceTop+faceH*0.18}
        Z" fill="${darken(capColor,15)}"/>`;
    }
    if (!persona.isMale) {
      svg += `<path d="M ${cx-faceW/2-3} ${faceTop+faceH*0.15} Q ${cx-faceW/2-5} ${eyeY}, ${cx-faceW/2-4} ${eyeY+15}" stroke="${hairColor.base}" stroke-width="5" fill="none" stroke-linecap="round"/>`;
      svg += `<path d="M ${cx+faceW/2+3} ${faceTop+faceH*0.15} Q ${cx+faceW/2+5} ${eyeY}, ${cx+faceW/2+4} ${eyeY+15}" stroke="${hairColor.base}" stroke-width="5" fill="none" stroke-linecap="round"/>`;
    }
  } else if (persona.isMale) {
    const s = Math.floor(Math.random()*5);
    if (s===0) {
      svg += `<path d="M ${cx-faceW/2} ${hairInner} Q ${cx-faceW/2-2} ${hairTop}, ${cx} ${hairTop-3} Q ${cx+faceW/2+2} ${hairTop}, ${cx+faceW/2} ${hairInner} L ${cx+faceW/2-3} ${hairInner-4} Q ${cx} ${faceTop+3}, ${cx-faceW/2+3} ${hairInner-4} Z" fill="url(#hg${uid})"/>`;
    } else if (s===1) {
      svg += `<path d="M ${cx-faceW/2-1} ${hairInner+3} Q ${cx-faceW/2-3} ${hairTop-3}, ${cx} ${hairTop-6} Q ${cx+faceW/2+3} ${hairTop-3}, ${cx+faceW/2+1} ${hairInner+3} L ${cx+faceW/2-2} ${hairInner-2} Q ${cx} ${faceTop+2}, ${cx-faceW/2+2} ${hairInner-2} Z" fill="url(#hg${uid})"/>`;
      svg += `<path d="M ${cx-10} ${faceTop+5} Q ${cx} ${faceTop+12}, ${cx+14} ${faceTop+6} Q ${cx+12} ${hairTop}, ${cx} ${hairTop-2} Q ${cx-8} ${hairTop}, ${cx-10} ${faceTop+5} Z" fill="${hairColor.base}" opacity="0.9"/>`;
    } else if (s===2) {
      svg += `<path d="M ${cx-faceW/2} ${hairInner} Q ${cx-faceW/2-2} ${hairTop}, ${cx} ${hairTop-4} Q ${cx+faceW/2+2} ${hairTop}, ${cx+faceW/2} ${hairInner} L ${cx+faceW/2-3} ${hairInner-3} Q ${cx+5} ${faceTop+4}, ${cx-10} ${faceTop+6} Q ${cx-faceW/2+3} ${faceTop+4}, ${cx-faceW/2+1} ${hairInner-3} Z" fill="url(#hg${uid})"/>`;
    } else if (s===3) {
      svg += `<path d="M ${cx-faceW/2+1} ${hairInner-2} Q ${cx-faceW/2} ${hairTop+2}, ${cx} ${hairTop} Q ${cx+faceW/2} ${hairTop+2}, ${cx+faceW/2-1} ${hairInner-2} L ${cx+faceW/2-4} ${hairInner-5} Q ${cx} ${faceTop+4}, ${cx-faceW/2+4} ${hairInner-5} Z" fill="url(#hg${uid})"/>`;
    } else {
      svg += `<path d="M ${cx-faceW/2-2} ${hairInner} Q ${cx-faceW/2-4} ${hairTop-5}, ${cx-faceW/4} ${hairTop-10} L ${cx-5} ${hairTop-6} L ${cx+5} ${hairTop-12} L ${cx+faceW/4} ${hairTop-8} Q ${cx+faceW/2+4} ${hairTop-3}, ${cx+faceW/2+2} ${hairInner} L ${cx+faceW/2-2} ${hairInner-3} Q ${cx} ${faceTop+2}, ${cx-faceW/2+2} ${hairInner-3} Z" fill="url(#hg${uid})"/>`;
    }
  } else {
    const s = Math.floor(Math.random()*5);
    if (s===0) {
      svg += `<path d="M ${cx-faceW/2-6} ${eyeY+14} Q ${cx-faceW/2-7} ${hairTop-3}, ${cx} ${hairTop-5} Q ${cx+faceW/2+7} ${hairTop-3}, ${cx+faceW/2+6} ${eyeY+14} L ${cx+faceW/2+1} ${eyeY+4} Q ${cx+faceW/2-1} ${faceTop+4}, ${cx} ${faceTop+2} Q ${cx-faceW/2+1} ${faceTop+4}, ${cx-faceW/2-1} ${eyeY+4} Z" fill="url(#hg${uid})"/>`;
    } else if (s===1) {
      svg += `<path d="M ${cx-faceW/2-8} ${faceBottom+10} Q ${cx-faceW/2-9} ${hairTop-3}, ${cx} ${hairTop-6} Q ${cx+faceW/2+9} ${hairTop-3}, ${cx+faceW/2+8} ${faceBottom+10} L ${cx+faceW/2+2} ${faceBottom+2} Q ${cx+faceW/2+1} ${faceTop+4}, ${cx} ${faceTop+2} Q ${cx-faceW/2-1} ${faceTop+4}, ${cx-faceW/2-2} ${faceBottom+2} Z" fill="url(#hg${uid})"/>`;
    } else if (s===2) {
      svg += `<path d="M ${cx-faceW/2-5} ${eyeY+18} Q ${cx-faceW/2-6} ${hairTop-3}, ${cx} ${hairTop-5} Q ${cx+faceW/2+6} ${hairTop-3}, ${cx+faceW/2+5} ${eyeY+18} L ${cx+faceW/2+1} ${hairInner-2} Q ${cx} ${faceTop+3}, ${cx-faceW/2-1} ${hairInner-2} Z" fill="url(#hg${uid})"/>`;
      svg += `<path d="M ${cx-faceW/2+2} ${faceTop+6} Q ${cx} ${faceTop+14}, ${cx+faceW/2-2} ${faceTop+6} Q ${cx+faceW/2-2} ${faceTop+1}, ${cx} ${faceTop} Q ${cx-faceW/2+2} ${faceTop+1}, ${cx-faceW/2+2} ${faceTop+6} Z" fill="${hairColor.base}"/>`;
    } else if (s===3) {
      svg += `<path d="M ${cx-faceW/2-1} ${hairInner+2} Q ${cx-faceW/2-3} ${hairTop-4}, ${cx} ${hairTop-7} Q ${cx+faceW/2+3} ${hairTop-4}, ${cx+faceW/2+1} ${hairInner+2} L ${cx+faceW/2-2} ${hairInner-2} Q ${cx} ${faceTop+3}, ${cx-faceW/2+2} ${hairInner-2} Z" fill="url(#hg${uid})"/>`;
      svg += `<path d="M ${cx+faceW/2} ${faceTop+faceH*0.1} Q ${cx+faceW/2+6} ${faceTop+faceH*0.05}, ${cx+faceW/2+4} ${faceTop+faceH*0.2}" stroke="${hairColor.base}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
    } else {
      svg += `<path d="M ${cx-faceW/2} ${hairInner} Q ${cx-faceW/2-2} ${hairTop-2}, ${cx} ${hairTop-4} Q ${cx+faceW/2+2} ${hairTop-2}, ${cx+faceW/2} ${hairInner} L ${cx+faceW/2-3} ${hairInner-3} Q ${cx} ${faceTop+3}, ${cx-faceW/2+3} ${hairInner-3} Z" fill="url(#hg${uid})"/>`;
      svg += `<ellipse cx="${cx+5}" cy="${hairTop-8}" rx="10" ry="12" fill="${hairColor.base}"/>`;
    }
  }
  // Eyebrows
  const browY = eyeY - 7;
  svg += `<path d="M ${cx-eyeSpacing-8} ${browY+1} Q ${cx-eyeSpacing} ${browY-2}, ${cx-eyeSpacing+8} ${browY}" stroke="${hairColor.base}" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
  svg += `<path d="M ${cx+eyeSpacing-8} ${browY} Q ${cx+eyeSpacing} ${browY-2}, ${cx+eyeSpacing+8} ${browY+1}" stroke="${hairColor.base}" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;

  // Eyes
  const eyeH = eyeSize * 0.65;
  svg += `<ellipse cx="${cx-eyeSpacing}" cy="${eyeY}" rx="${eyeSize}" ry="${eyeH}" fill="white"/>`;
  svg += `<circle cx="${cx-eyeSpacing}" cy="${eyeY+0.5}" r="${eyeSize*0.45}" fill="#2c1810"/>`;
  svg += `<circle cx="${cx-eyeSpacing+1}" cy="${eyeY-0.5}" r="${eyeSize*0.18}" fill="white"/>`;
  svg += `<ellipse cx="${cx+eyeSpacing}" cy="${eyeY}" rx="${eyeSize}" ry="${eyeH}" fill="white"/>`;
  svg += `<circle cx="${cx+eyeSpacing}" cy="${eyeY+0.5}" r="${eyeSize*0.45}" fill="#2c1810"/>`;
  svg += `<circle cx="${cx+eyeSpacing+1}" cy="${eyeY-0.5}" r="${eyeSize*0.18}" fill="white"/>`;
  // Eyelid line
  svg += `<path d="M ${cx-eyeSpacing-eyeSize} ${eyeY} Q ${cx-eyeSpacing} ${eyeY-eyeH-1}, ${cx-eyeSpacing+eyeSize} ${eyeY}" stroke="${darken(skin.base,35)}" stroke-width="0.8" fill="none"/>`;
  svg += `<path d="M ${cx+eyeSpacing-eyeSize} ${eyeY} Q ${cx+eyeSpacing} ${eyeY-eyeH-1}, ${cx+eyeSpacing+eyeSize} ${eyeY}" stroke="${darken(skin.base,35)}" stroke-width="0.8" fill="none"/>`;

  // Nose
  svg += `<path d="M ${cx} ${noseY-8} L ${cx} ${noseY-2}" stroke="${skin.shadow}" stroke-width="1" opacity="0.5" stroke-linecap="round"/>`;
  svg += `<path d="M ${cx-4} ${noseY} Q ${cx} ${noseY+2}, ${cx+4} ${noseY}" stroke="${darken(skin.base,40)}" stroke-width="0.8" fill="none" opacity="0.5"/>`;

  // Mouth
  if (Math.random() > 0.4) {
    svg += `<path d="M ${cx-8} ${mouthY} Q ${cx} ${mouthY+5}, ${cx+8} ${mouthY}" stroke="${lip}" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
  } else {
    svg += `<ellipse cx="${cx}" cy="${mouthY+1}" rx="7" ry="3" fill="${lip}"/>`;
  }

  // Blush
  svg += `<ellipse cx="${cx-15}" cy="${noseY+3}" rx="7" ry="5" fill="#ffb0b0" opacity="0.12"/>`;
  svg += `<ellipse cx="${cx+15}" cy="${noseY+3}" rx="7" ry="5" fill="#ffb0b0" opacity="0.12"/>`;

  // Glasses — varied styles
  if (hasGlasses) {
    const gr = eyeSize + 3;
    const glassStyle = Math.floor(Math.random() * 3);
    const frameColor = pick(['#333','#1a1a1a','#8B4513','#C0C0C0','#DAA520']);
    if (glassStyle === 0) { // round
      svg += `<circle cx="${cx-eyeSpacing}" cy="${eyeY}" r="${gr}" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
      svg += `<circle cx="${cx+eyeSpacing}" cy="${eyeY}" r="${gr}" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
    } else if (glassStyle === 1) { // square
      svg += `<rect x="${cx-eyeSpacing-gr}" y="${eyeY-gr*0.7}" width="${gr*2}" height="${gr*1.4}" rx="2" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
      svg += `<rect x="${cx+eyeSpacing-gr}" y="${eyeY-gr*0.7}" width="${gr*2}" height="${gr*1.4}" rx="2" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
    } else { // cat-eye / aviator
      svg += `<path d="M ${cx-eyeSpacing-gr} ${eyeY+gr*0.3} Q ${cx-eyeSpacing-gr} ${eyeY-gr}, ${cx-eyeSpacing} ${eyeY-gr} Q ${cx-eyeSpacing+gr} ${eyeY-gr}, ${cx-eyeSpacing+gr} ${eyeY+gr*0.3} Q ${cx-eyeSpacing+gr} ${eyeY+gr}, ${cx-eyeSpacing} ${eyeY+gr} Q ${cx-eyeSpacing-gr} ${eyeY+gr}, ${cx-eyeSpacing-gr} ${eyeY+gr*0.3} Z" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
      svg += `<path d="M ${cx+eyeSpacing-gr} ${eyeY+gr*0.3} Q ${cx+eyeSpacing-gr} ${eyeY-gr}, ${cx+eyeSpacing} ${eyeY-gr} Q ${cx+eyeSpacing+gr} ${eyeY-gr}, ${cx+eyeSpacing+gr} ${eyeY+gr*0.3} Q ${cx+eyeSpacing+gr} ${eyeY+gr}, ${cx+eyeSpacing} ${eyeY+gr} Q ${cx+eyeSpacing-gr} ${eyeY+gr}, ${cx+eyeSpacing-gr} ${eyeY+gr*0.3} Z" fill="none" stroke="${frameColor}" stroke-width="1.8"/>`;
    }
    svg += `<path d="M ${cx-eyeSpacing+gr} ${eyeY} Q ${cx} ${eyeY-2}, ${cx+eyeSpacing-gr} ${eyeY}" fill="none" stroke="${frameColor}" stroke-width="1.2"/>`;
    // Arms
    svg += `<line x1="${cx-eyeSpacing-gr}" y1="${eyeY}" x2="${cx-faceW/2+1}" y2="${eyeY+2}" stroke="${frameColor}" stroke-width="1.2"/>`;
    svg += `<line x1="${cx+eyeSpacing+gr}" y1="${eyeY}" x2="${cx+faceW/2-1}" y2="${eyeY+2}" stroke="${frameColor}" stroke-width="1.2"/>`;
  }

  // Earrings
  if (hasEarrings) {
    const earringStyle = Math.floor(Math.random() * 2);
    const earringColor = pick(['#C0C0C0','#DAA520','#FFD700']);
    if (earringStyle === 0) { // hoop
      svg += `<circle cx="${cx-faceW/2}" cy="${eyeY+14}" r="4" fill="none" stroke="${earringColor}" stroke-width="1.2"/>`;
      svg += `<circle cx="${cx+faceW/2}" cy="${eyeY+14}" r="4" fill="none" stroke="${earringColor}" stroke-width="1.2"/>`;
    } else { // stud
      svg += `<circle cx="${cx-faceW/2}" cy="${eyeY+10}" r="2" fill="${earringColor}"/>`;
      svg += `<circle cx="${cx+faceW/2}" cy="${eyeY+10}" r="2" fill="${earringColor}"/>`;
    }
  }

  // Mole
  if (hasMole) {
    const moleX = cx + pick([-1,1]) * rand(8, 20);
    const moleY = rand(noseY, mouthY + 5);
    svg += `<circle cx="${moleX}" cy="${moleY}" r="1.2" fill="#4a3020"/>`;
  }

  // Freckles
  if (hasFreckles) {
    for (let f = 0; f < 5; f++) {
      const fx = cx + rand(-18, 18);
      const fy = noseY + rand(-5, 10);
      svg += `<circle cx="${fx}" cy="${fy}" r="0.8" fill="#b08060" opacity="0.4"/>`;
    }
  }

  svg += `</svg>`;
  return { svg, skinIdx, hairIdx, shirtIdx };
}

// Grid - horizontal scroll
const grid = document.getElementById('grid');
const counterEl = document.getElementById('counter');
let totalGenerated = 0;
const BATCH = 20;
let activePopup = null;

// Pre-generate diverse avatars ensuring no adjacent duplicates
function generateDiverseBatch(count) {
  const avatars = [];
  let lastSkin = -1, lastHair = -1, lastShirt = -1, lastGender = -1;

  for (let i = 0; i < count; i++) {
    let persona, attempts = 0;
    do {
      persona = generatePersona();
      attempts++;
    } while (attempts < 10 && persona.isMale === (lastGender === 1));

    lastGender = persona.isMale ? 1 : 0;

    // Force different skin/hair/shirt from previous
    const avatar = generateAvatarDiverse(persona, lastSkin, lastHair, lastShirt);
    lastSkin = avatar.skinIdx;
    lastHair = avatar.hairIdx;
    lastShirt = avatar.shirtIdx;

    avatars.push({ persona, svg: avatar.svg });
  }
  return avatars;
}

function addBatch() {
  const batch = generateDiverseBatch(BATCH);
  batch.forEach(({ persona, svg }) => {
    const card = document.createElement('div');
    card.className = 'avatar-card';
    card.innerHTML = svg;

    const info = document.createElement('div');
    info.className = 'persona-info';
    info.innerHTML = `<div class="name">${persona.name}</div><div class="desc">${persona.desc}</div>`;
    card.appendChild(info);

    card.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activePopup && activePopup !== info) activePopup.classList.remove('show');
      info.classList.toggle('show');
      activePopup = info.classList.contains('show') ? info : null;
    });

    grid.appendChild(card);
    totalGenerated++;
  });
  counterEl.textContent = `${totalGenerated.toLocaleString()} personas generated`;
}

// Initial load
addBatch();

// Convert vertical scroll to horizontal scroll (smooth native)
grid.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    grid.scrollLeft += e.deltaY;
  }
}, { passive: false });

// Infinite horizontal scroll
grid.addEventListener('scroll', () => {
  if (grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 400) {
    if (totalGenerated < 10000) addBatch();
  }
});

// Close popup on outside click
document.addEventListener('click', () => {
  if (activePopup) { activePopup.classList.remove('show'); activePopup = null; }
});

if (isThumb) { document.getElementById('header').style.display = 'none'; }
</script>
