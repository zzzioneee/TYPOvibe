<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 28 — Chiky&Cheky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <!-- 호버 감지 그리드 (5×5) — wrap 앞에 위치해야 ~ 선택자 작동 -->
    <i class="g r1 c1"></i><i class="g r1 c2"></i><i class="g r1 c3"></i><i class="g r1 c4"></i><i class="g r1 c5"></i>
    <i class="g r2 c1"></i><i class="g r2 c2"></i><i class="g r2 c3"></i><i class="g r2 c4"></i><i class="g r2 c5"></i>
    <i class="g r3 c1"></i><i class="g r3 c2"></i><i class="g r3 c3"></i><i class="g r3 c4"></i><i class="g r3 c5"></i>
    <i class="g r4 c1"></i><i class="g r4 c2"></i><i class="g r4 c3"></i><i class="g r4 c4"></i><i class="g r4 c5"></i>
    <i class="g r5 c1"></i><i class="g r5 c2"></i><i class="g r5 c3"></i><i class="g r5 c4"></i><i class="g r5 c5"></i>

    <!-- 캐릭터 -->
    <div class="wrap">
      <div class="chiky">
        <!-- 몸통 -->
        <div class="body">
          <u class="body-front"></u>
          <u class="body-left"></u>
          <u class="body-right"></u>
          <u class="body-back"></u>
          <u class="body-top"></u>
          <u class="body-bottom"></u>
        </div>

        <!-- 벼슬 -->
        <div class="comb">
          <u class="comb-front"></u>
          <u class="comb-left"></u>
          <u class="comb-right"></u>
          <u class="comb-back"></u>
        </div>

        <!-- 눈 패치 -->
        <div class="eye-patch">
          <u class="patch-left"></u>
          <u class="patch-right"></u>
          <u class="patch-bridge"></u>
        </div>

        <!-- 왼쪽 눈 -->
        <div class="eye eye-l">
          <u class="eyeball"></u>
          <u class="lid"></u>
        </div>

        <!-- 오른쪽 눈 -->
        <div class="eye eye-r">
          <u class="eyeball"></u>
          <u class="lid"></u>
        </div>

        <!-- 부리 -->
        <div class="beak">
          <u class="beak-outer"></u>
          <u class="beak-hole"></u>
        </div>

        <!-- 발 -->
        <div class="feet">
          <u class="foot-l"></u>
          <u class="foot-r"></u>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
