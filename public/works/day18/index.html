<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Day 18 — 햄찌의 분노</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Noto Sans KR',sans-serif;cursor:none;}

#scene{
  position:fixed;inset:0;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
}

#main{
  display:block;
}

#hamster-cursor{
  position:fixed;width:360px;pointer-events:none;z-index:1000;
  transform:translate(-38%,-62%);
  filter:drop-shadow(2px 4px 8px rgba(0,0,0,0.25));
}

/* HP 바 */
#hp-wrap{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.95);border:1px solid #ddd;
  border-radius:20px;padding:6px 16px;
  display:flex;align-items:center;gap:10px;
  z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.1);min-width:200px;
}
#hp-label{font-size:12px;font-weight:700;white-space:nowrap;}
#hp-bar-outer{flex:1;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden;}
#hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#4caf50,#8bc34a);border-radius:5px;transition:width 0.15s,background 0.3s;}
#hp-num{font-size:11px;font-weight:700;min-width:36px;text-align:right;}

/* 툴바 */
#toolbar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;
  background:rgba(255,255,255,0.95);border:1px solid #ddd;border-radius:40px;
  padding:8px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:100;
}
.tool-btn{
  position:relative;width:48px;height:48px;border-radius:50%;
  border:2px solid transparent;background:#f5f5f5;cursor:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:20px;gap:1px;transition:background 0.15s,border-color 0.15s;
}
.tool-btn .tl{font-size:8px;font-weight:700;color:#555;}
.tool-btn.selected{border-color:#333;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.tool-btn .sk{
  position:absolute;top:-4px;right:-4px;background:#333;color:#fff;
  border-radius:50%;width:14px;height:14px;font-size:8px;
  display:flex;align-items:center;justify-content:center;font-family:monospace;
}

/* 말풍선 */
#bubble{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) scale(0.8);
  background:#ffff88;border:2px solid #333;border-radius:12px;
  padding:8px 14px;font-size:13px;font-weight:700;white-space:nowrap;
  z-index:200;opacity:0;transition:opacity 0.15s,transform 0.15s;
  pointer-events:none;box-shadow:2px 2px 0 #333;
}
#bubble.show{opacity:1;transform:translateX(-50%) scale(1);}

/* 최종 박살 */
#final-msg{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:500;opacity:0;pointer-events:none;transition:opacity 0.5s;
}
#final-msg.show{opacity:1;pointer-events:all;}
#final-msg-inner{
  background:#fff;border:3px solid #000;padding:28px 44px;
  text-align:center;box-shadow:6px 6px 0 #000;
}
#final-msg-inner h2{font-size:28px;font-weight:900;margin-bottom:8px;}
#final-msg-inner p{font-size:14px;color:#555;margin-bottom:16px;}
#restart-btn{
  padding:10px 24px;background:#000;color:#fff;border:none;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}

body.is-thumb #toolbar,body.is-thumb #hp-wrap,
body.is-thumb #bubble,body.is-thumb #final-msg{display:none!important;}
</style>
</head>
<body>
<div id="scene"><canvas id="main"></canvas></div>
<img id="hamster-cursor" src="Hamster.png" alt="" draggable="false"/>

<div id="hp-wrap">
  <div id="hp-label">🖥️ 맥북 HP</div>
  <div id="hp-bar-outer"><div id="hp-bar"></div></div>
  <div id="hp-num">100</div>
</div>

<div id="toolbar">
  <div><button class="tool-btn selected" id="btn-claw">🐾<div class="tl">발톱</div><span class="sk">Q</span></button></div>
  <div><button class="tool-btn" id="btn-bomb">🌻<div class="tl">씨폭탄</div><span class="sk">W</span></button></div>
  <div><button class="tool-btn" id="btn-flame">🔥<div class="tl">화염</div><span class="sk">E</span></button></div>
  <div><button class="tool-btn" id="btn-fist">👊<div class="tl">주먹</div><span class="sk">R</span></button></div>
</div>

<div id="bubble"></div>

<div id="final-msg">
  <div id="final-msg-inner">
    <h2>🐹 완전히 박살났다!</h2>
    <p>햄찌의 분노가 맥북을 완전히 파괴했습니다</p>
    <button id="restart-btn">🔄 다시하기</button>
  </div>
</div>

<script src="day18.js"></script>
</body>
</html>
