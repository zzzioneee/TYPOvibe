<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Day 18 — 햄찌의 분노</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Noto Sans KR',sans-serif;cursor:none;}

#scene{
  position:fixed;inset:0;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
}

#main{
  display:block;
  position:relative;
  z-index:1;
}

#hamster-cursor{
  position:fixed;width:360px;pointer-events:none;z-index:1000;
  transform:translate(-38%,-62%);
  filter:drop-shadow(2px 4px 8px rgba(0,0,0,0.25));
}

/* HP 바 — 우측 상단 */
#hp-wrap{
  position:fixed;top:20px;right:64px;
  display:flex;align-items:center;gap:10px;
  z-index:100;min-width:220px;
}
#hp-label{font-size:14px;font-weight:900;color:#111;white-space:nowrap;}
#hp-bar-outer{flex:1;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
#hp-bar{height:100%;width:100%;background:#f44336;border-radius:4px;transition:width 0.15s;}
#hp-num{font-size:14px;font-weight:700;color:#111;min-width:28px;text-align:right;}

/* 툴바 — 우측 세로 목록 */
#toolbar{
  position:fixed;top:50%;right:64px;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:20px;
  z-index:100;
}
.tool-btn{
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;
  padding:16px 28px;
  background:#fff;
  border:1.5px solid #e0e0e0;
  border-radius:100px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  transition:box-shadow 0.15s,border-color 0.15s;
  min-width:160px;
}
.tool-btn .tl{
  font-size:14px;font-weight:700;color:#111;
  white-space:nowrap;
}
.tool-btn .sk{
  font-size:14px;font-weight:900;color:#111;
  font-family:'Noto Sans KR',sans-serif;
}
.tool-btn.selected{
  border-color:#111;
  box-shadow:0 2px 12px rgba(0,0,0,0.18);
}
.tool-btn:hover{box-shadow:0 2px 12px rgba(0,0,0,0.15);}

/* 말풍선 — 햄스터 오른쪽 상단에 고정 따라다님 */
#bubble{
  position:fixed;
  background:#ffff55;
  border:2.5px solid #111;
  border-radius:14px;
  padding:8px 14px;
  font-size:15px;font-weight:900;white-space:nowrap;
  color:#111;
  z-index:2000;
  opacity:0;
  pointer-events:none;
  box-shadow:2px 2px 0 #111;
  transition:opacity 0.15s;
  transform:none;
}
#bubble.show{opacity:1;}

/* 최종 박살 */
#final-msg{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:500;opacity:0;pointer-events:none;transition:opacity 0.5s;
}
#final-msg.show{opacity:1;pointer-events:all;}
#final-msg-inner{
  background:#fff;border:3px solid #000;padding:28px 44px;
  text-align:center;box-shadow:6px 6px 0 #000;
}
#final-msg-inner h2{font-size:28px;font-weight:900;margin-bottom:8px;}
#final-msg-inner p{font-size:14px;color:#555;margin-bottom:16px;}
/* restart-btn은 tool-btn 스타일 재사용 */

body.is-thumb #toolbar,body.is-thumb #hp-wrap,
body.is-thumb #bubble,body.is-thumb #final-msg{display:none!important;}
</style>
</head>
<body>
<div id="scene"><canvas id="main"></canvas></div>
<img id="hamster-cursor" src="Hamster.png" alt="" draggable="false"/>

<div id="hp-wrap">
  <div id="hp-label">HP</div>
  <div id="hp-bar-outer"><div id="hp-bar"></div></div>
  <div id="hp-num">100</div>
</div>

<div id="toolbar">
  <button class="tool-btn selected" id="btn-claw">
    <span class="tl">발톱공격</span><span class="sk">Q</span>
  </button>
  <button class="tool-btn" id="btn-flame">
    <span class="tl">불지르기</span><span class="sk">W</span>
  </button>
  <button class="tool-btn" id="btn-fist">
    <span class="tl">파멸펀치</span><span class="sk">E</span>
  </button>
</div>

<div id="bubble"></div>

<div id="final-msg">
  <div id="final-msg-inner">
    <h2>완전히 박살났다!</h2>
    <p>햄찌의 분노가 맥북을 완전히 파괴했습니다</p>
    <button id="restart-btn" class="tool-btn" style="margin:0 auto;background:#fff;cursor:pointer;">
      <span class="tl" style="color:#111;">다시하기</span><span class="sk" style="color:#111;">R</span>
    </button>
  </div>
</div>

<script src="day18.js"></script>
</body>
</html>
