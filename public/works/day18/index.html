<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Day 18 — 말하면 그려줌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#fff;
  font-family:'Noto Sans KR', sans-serif;
  overflow:hidden;
}

/* ── 레이아웃 ── */
.app {
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── 캔버스 영역 ── */
.canvas-wrap {
  position:relative;
  width:min(80vw, 80vh);
  height:min(80vw, 80vh);
  background:#fff;
  border:2px solid #111;
  flex-shrink:0;
}
.canvas-wrap img {
  width:100%; height:100%;
  object-fit:contain;
  display:block;
}
.canvas-placeholder {
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ccc;
  font-size:clamp(12px, 2vw, 18px);
  text-align:center;
  line-height:1.6;
  padding:20px;
  white-space:pre-line;
}

/* ── 로딩 오버레이 ── */
.loading-overlay {
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.85);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.loading-overlay.active {
  opacity:1;
  pointer-events:all;
}
.loading-dots {
  display:flex; gap:8px;
}
.loading-dots span {
  width:10px; height:10px;
  background:#111;
  border-radius:50%;
  animation:bounce 1.2s infinite ease-in-out;
}
.loading-dots span:nth-child(2) { animation-delay:0.2s; }
.loading-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce {
  0%,80%,100% { transform:scale(0.5); opacity:0.4; }
  40% { transform:scale(1); opacity:1; }
}
.loading-text {
  font-size:13px;
  color:#555;
  letter-spacing:0.05em;
}

/* ── 컨트롤 영역 ── */
.controls {
  margin-top:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  width:min(80vw, 80vh);
}

/* ── 음성 텍스트 표시 ── */
.transcript-box {
  width:100%;
  min-height:40px;
  background:#f5f5f5;
  border:1.5px solid #ddd;
  padding:10px 14px;
  font-size:clamp(12px, 1.8vw, 15px);
  color:#333;
  line-height:1.5;
  position:relative;
  text-align:left;
}
.transcript-box .interim {
  color:#aaa;
}
.transcript-hint {
  font-size:11px;
  color:#bbb;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  white-space:nowrap;
}

/* ── 마이크 버튼 ── */
.mic-btn {
  width:64px; height:64px;
  border-radius:50%;
  border:2.5px solid #111;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.15s, transform 0.1s;
  flex-shrink:0;
}
.mic-btn:hover { background:#f0f0f0; }
.mic-btn.recording {
  background:#111;
  animation:pulse 1.4s infinite;
}
.mic-btn.recording svg path { fill:#fff; }
@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(0,0,0,0.3); }
  50% { box-shadow:0 0 0 10px rgba(0,0,0,0); }
}
.mic-icon { width:28px; height:28px; }

/* ── 하단 상태 텍스트 ── */
.status-text {
  font-size:clamp(10px, 1.5vw, 12px);
  color:#999;
  letter-spacing:0.08em;
  text-align:center;
  height:16px;
}

/* ── API 키 모달 ── */
.modal-bg {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modal {
  background:#fff;
  padding:32px;
  width:min(90vw, 440px);
  display:flex;
  flex-direction:column;
  gap:16px;
}
.modal h2 {
  font-size:20px;
  font-weight:700;
  line-height:1.3;
}
.modal p {
  font-size:13px;
  color:#555;
  line-height:1.7;
}
.modal input {
  width:100%;
  padding:10px 14px;
  border:1.5px solid #ccc;
  font-size:14px;
  font-family:monospace;
  outline:none;
}
.modal input:focus { border-color:#111; }
.modal-btn {
  padding:12px;
  background:#111;
  color:#fff;
  border:none;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:'Noto Sans KR', sans-serif;
  transition:opacity 0.15s;
}
.modal-btn:hover { opacity:0.8; }
.modal-note {
  font-size:11px;
  color:#aaa;
  text-align:center;
}

/* ── 이전 이미지 히스토리 ── */
.history-row {
  display:flex;
  gap:6px;
  overflow-x:auto;
  width:100%;
  padding-bottom:2px;
}
.history-row::-webkit-scrollbar { height:3px; }
.history-row::-webkit-scrollbar-thumb { background:#ddd; }
.history-thumb {
  width:52px; height:52px;
  flex-shrink:0;
  border:1.5px solid #ddd;
  cursor:pointer;
  object-fit:cover;
  transition:border-color 0.15s;
}
.history-thumb:hover { border-color:#111; }

/* ── 썸네일 모드 ── */
body.is-thumb .controls,
body.is-thumb .modal-bg { display:none !important; }
</style>
</head>
<body>

<!-- API 키 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>OpenAI API 키 입력</h2>
    <p>음성으로 말하면 GPT-Image-1이 그려드립니다.<br>키는 이 브라우저에만 저장되고 외부로 전송되지 않아요.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off"/>
    <button class="modal-btn" id="saveKeyBtn">시작하기</button>
    <p class="modal-note">키는 localStorage에만 저장됩니다</p>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app">
  <!-- 이미지 캔버스 -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas-placeholder" id="placeholder">마이크를 누르고\n뭔가 말해봐요</div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="loading-text" id="loadingText">그리는 중...</div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="controls">
    <!-- 히스토리 -->
    <div class="history-row" id="historyRow"></div>

    <!-- 음성 텍스트 -->
    <div class="transcript-box" id="transcriptBox">
      <span class="transcript-hint" id="transcriptHint">여기에 음성이 표시됩니다</span>
      <span id="finalText"></span><span class="interim" id="interimText"></span>
    </div>

    <!-- 마이크 버튼 -->
    <button class="mic-btn" id="micBtn" title="말하기">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1C10.34 1 9 2.34 9 4V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V4C15 2.34 13.66 1 12 1Z" fill="#111"/>
        <path d="M5 11C5 14.87 8.13 18 12 18C15.87 18 19 14.87 19 11H17C17 13.76 14.76 16 12 16C9.24 16 7 13.76 7 11H5Z" fill="#111"/>
        <path d="M11 19H13V23H11V19Z" fill="#111"/>
      </svg>
    </button>

    <!-- 상태 텍스트 -->
    <div class="status-text" id="statusText">마이크를 누르고 장면을 설명해봐요</div>
  </div>
</div>

<script>
'use strict';

var IS_THUMB = new URLSearchParams(location.search).has('thumb');
if (IS_THUMB) document.body.classList.add('is-thumb');

// ── DOM ──
var modalBg       = document.getElementById('modalBg');
var apiKeyInput   = document.getElementById('apiKeyInput');
var saveKeyBtn    = document.getElementById('saveKeyBtn');
var canvasWrap    = document.getElementById('canvasWrap');
var placeholder   = document.getElementById('placeholder');
var loadingOverlay= document.getElementById('loadingOverlay');
var loadingText   = document.getElementById('loadingText');
var transcriptBox = document.getElementById('transcriptBox');
var transcriptHint= document.getElementById('transcriptHint');
var finalText     = document.getElementById('finalText');
var interimText   = document.getElementById('interimText');
var micBtn        = document.getElementById('micBtn');
var statusText    = document.getElementById('statusText');
var historyRow    = document.getElementById('historyRow');

// ── 상태 ──
var apiKey        = '';
var isRecording   = false;
var recognition   = null;
var accFinal      = '';
var currentImg    = null;  // 현재 표시중인 img element
var isGenerating  = false;

// ── 하찮은 그림 스타일 고정 프롬프트 ──
var STYLE_PROMPT = [
  'Draw this in the most pathetic, amateurish style possible.',
  'Use MS Paint style with jagged mouse-drawn lines.',
  'White background, pixel-level imprecision.',
  'Colors slightly off, shapes vaguely recognizable but wrong.',
  'Look like a child drew it in 5 seconds.',
  'Subject: '
].join(' ');

// ── API 키 관리 ──
function loadKey() {
  var k = localStorage.getItem('oai_key_day18');
  if (k) {
    apiKey = k;
    modalBg.style.display = 'none';
  }
}

saveKeyBtn.addEventListener('click', function() {
  var k = apiKeyInput.value.trim();
  if (!k.startsWith('sk-')) {
    apiKeyInput.style.borderColor = '#f00';
    return;
  }
  localStorage.setItem('oai_key_day18', k);
  apiKey = k;
  modalBg.style.display = 'none';
});

apiKeyInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveKeyBtn.click();
  apiKeyInput.style.borderColor = '#ccc';
});

// ── 이미지 생성 ──
function generateImage(prompt) {
  if (isGenerating || !apiKey) return;
  if (!prompt.trim()) {
    setStatus('텍스트가 없어요. 다시 말해봐요.');
    return;
  }

  isGenerating = true;
  loadingOverlay.classList.add('active');
  loadingText.textContent = '"' + prompt.slice(0, 30) + (prompt.length > 30 ? '...' : '') + '" 그리는 중';
  setStatus('그리는 중...');

  var fullPrompt = STYLE_PROMPT + prompt;

  fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'gpt-image-1',
      prompt: fullPrompt,
      n: 1,
      size: '1024x1024',
      quality: 'low',
    }),
  })
  .then(function(res) {
    if (!res.ok) return res.json().then(function(e) { throw new Error(e.error?.message || res.status); });
    return res.json();
  })
  .then(function(data) {
    var b64 = data.data[0].b64_json;
    var url = 'data:image/png;base64,' + b64;
    showImage(url, prompt);
    addHistory(url, prompt);
    setStatus('완성! 다시 말하면 새로 그려요');
  })
  .catch(function(err) {
    console.error(err);
    setStatus('오류: ' + err.message);
  })
  .finally(function() {
    isGenerating = false;
    loadingOverlay.classList.remove('active');
  });
}

function showImage(url, prompt) {
  // 기존 이미지 제거
  if (currentImg) currentImg.remove();
  placeholder.style.display = 'none';

  var img = document.createElement('img');
  img.src = url;
  img.alt = prompt;
  img.title = prompt;
  canvasWrap.appendChild(img);
  currentImg = img;
}

// ── 히스토리 ──
function addHistory(url, prompt) {
  var thumb = document.createElement('img');
  thumb.src = url;
  thumb.alt = prompt;
  thumb.title = prompt;
  thumb.className = 'history-thumb';
  thumb.addEventListener('click', function() {
    showImage(url, prompt);
  });
  historyRow.insertBefore(thumb, historyRow.firstChild);
  // 최대 8개 유지
  while (historyRow.children.length > 8) {
    historyRow.removeChild(historyRow.lastChild);
  }
}

// ── 음성인식 ──
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  setStatus('이 브라우저는 음성인식을 지원하지 않아요 (Chrome 권장)');
  micBtn.disabled = true;
  micBtn.style.opacity = '0.3';
}

function initRecognition() {
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = function() {
    isRecording = true;
    micBtn.classList.add('recording');
    setStatus('듣고 있어요... 말을 마치면 버튼을 다시 눌러요');
    transcriptHint.style.display = 'none';
  };

  recognition.onresult = function(e) {
    var interim = '';
    var final_ = accFinal;

    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final_ += t;
      } else {
        interim += t;
      }
    }
    accFinal = final_;
    finalText.textContent = final_;
    interimText.textContent = interim;

    // interim이 있으면 힌트 숨김
    if (final_ || interim) {
      transcriptHint.style.display = 'none';
    }
  };

  recognition.onerror = function(e) {
    if (e.error === 'no-speech') return; // 무시
    if (e.error === 'not-allowed') {
      setStatus('마이크 권한이 필요해요');
    } else {
      setStatus('음성인식 오류: ' + e.error);
    }
    stopRecording();
  };

  recognition.onend = function() {
    if (isRecording) {
      // 연속 모드가 끊기면 재시작
      try { recognition.start(); } catch(e) {}
    }
  };
}

function startRecording() {
  if (!SpeechRecognition) return;
  accFinal = '';
  finalText.textContent = '';
  interimText.textContent = '';
  transcriptHint.style.display = '';

  if (!recognition) initRecognition();
  try {
    recognition.start();
  } catch(e) {
    // 이미 실행 중
  }
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }

  var text = accFinal.trim();
  interimText.textContent = '';

  if (text) {
    finalText.textContent = text;
    transcriptHint.style.display = 'none';
    setStatus('인식 완료. 그리는 중...');
    setTimeout(function() {
      generateImage(text);
    }, 300);
  } else {
    setStatus('말을 인식하지 못했어요. 다시 시도해봐요.');
    transcriptHint.style.display = '';
  }
}

micBtn.addEventListener('click', function() {
  if (!apiKey) {
    modalBg.style.display = 'flex';
    return;
  }
  if (isGenerating) return;
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

function setStatus(msg) {
  statusText.textContent = msg;
}

// ── 초기화 ──
loadKey();
</script>
</body>
</html>
